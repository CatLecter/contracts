syntax = "proto3";

package CatLecter.contracts.v1.auth;

option go_package = "v1/auth;auth_v1";

service Auth {
  rpc Register (NewUserRequest) returns (LoginResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
}

message NewUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string confirm_password = 4;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
}
